<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单据智能提取 · N7R科技</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap');
  :root {
    --bg:#080f1a;--panel:#0f1c2e;--panel2:#152233;--border:rgba(255,255,255,0.07);
    --blue:#3b82f6;--sky:#38bdf8;--teal:#0d9488;--green:#22c55e;
    --orange:#f97316;--red:#ef4444;--gray:#64748b;--muted:#94a3b8;
    --white:#f1f5f9;--ink:#0f172a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;display:flex;flex-direction:column;}
  header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--panel);}
  .logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .header-text h1{font-size:15px;font-weight:600;}
  .header-text p{font-size:11px;color:var(--muted);margin-top:1px;}
  .header-badge{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:var(--sky);background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2);padding:3px 10px;border-radius:20px;}
  .app{display:grid;grid-template-columns:1fr 1fr;flex:1;}
  @media(max-width:768px){.app{grid-template-columns:1fr;}}
  .left{border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px;gap:16px;overflow-y:auto;}
  .panel-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .dropzone{border:2px dashed rgba(59,130,246,0.3);border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;transition:all 0.2s;background:rgba(59,130,246,0.03);position:relative;}
  .dropzone:hover,.dropzone.drag{border-color:var(--blue);background:rgba(59,130,246,0.08);}
  .dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
  .dz-icon{font-size:32px;margin-bottom:10px;}
  .dz-title{font-size:13px;font-weight:600;color:var(--white);margin-bottom:4px;}
  .dz-sub{font-size:11px;color:var(--muted);}
  .preview-area{border-radius:10px;overflow:hidden;background:var(--panel2);border:1px solid var(--border);min-height:120px;display:flex;align-items:center;justify-content:center;}
  .preview-area img{max-width:100%;max-height:280px;object-fit:contain;display:block;}
  .pdf-icon{text-align:center;padding:24px;color:var(--muted);font-size:12px;}
  .pdf-icon div{font-size:36px;margin-bottom:8px;}
  .extract-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue),#1d4ed8);border:none;border-radius:10px;color:white;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Inter',sans-serif;}
  .extract-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px rgba(59,130,246,0.35);}
  .extract-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .spin{animation:spin 1s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .right{display:flex;flex-direction:column;padding:24px;gap:16px;overflow-y:auto;}
  .status-bar{padding:10px 14px;border-radius:8px;font-size:12px;display:none;align-items:center;gap:8px;}
  .status-bar.show{display:flex;}
  .status-bar.loading{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:#93c5fd;}
  .status-bar.success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#86efac;}
  .status-bar.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
  .result-card{background:var(--panel2);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:none;}
  .result-card.show{display:block;}
  .result-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .result-header-left{display:flex;align-items:center;gap:10px;}
  .result-title{font-size:13px;font-weight:600;}
  .confidence-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-family:'DM Mono',monospace;}
  .conf-high{background:rgba(34,197,94,0.15);color:#86efac;}
  .conf-med{background:rgba(249,115,22,0.15);color:#fdba74;}
  .fields-section{padding:16px 18px;border-bottom:1px solid var(--border);}
  .fields-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:12px;}
  .field-row{display:grid;grid-template-columns:110px 1fr;gap:8px;margin-bottom:8px;align-items:start;}
  .field-key{font-size:11px;color:var(--muted);padding-top:6px;}
  .field-val{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--white);min-height:30px;outline:none;font-family:'Inter',sans-serif;resize:none;width:100%;}
  .field-val:focus{border-color:rgba(59,130,246,0.5);background:rgba(59,130,246,0.05);}
  .items-section{padding:16px 18px;}
  .items-table{width:100%;border-collapse:collapse;font-size:11px;}
  .items-table th{text-align:left;padding:6px 8px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);}
  .items-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:top;}
  .items-table tr:last-child td{border-bottom:none;}
  .item-input{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:11px;color:var(--white);width:100%;outline:none;font-family:'Inter',sans-serif;}
  .item-input:focus{border-color:rgba(59,130,246,0.4);}
  .item-tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(59,130,246,0.15);color:#93c5fd;font-weight:500;margin-bottom:2px;}
  .actions{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;}
  .btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
  .btn-primary{background:var(--teal);color:white;}
  .btn-primary:hover{background:#0f766e;}
  .btn-secondary{background:rgba(255,255,255,0.06);color:var(--white);border:1px solid var(--border);}
  .btn-secondary:hover{background:rgba(255,255,255,0.1);}
  .btn-ghost{background:transparent;color:var(--muted);font-size:11px;}
  .btn-ghost:hover{color:var(--white);}
  .history-item{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all 0.15s;}
  .history-item:hover{border-color:rgba(59,130,246,0.3);background:rgba(59,130,246,0.04);}
  .hi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
  .hi-supplier{font-size:13px;font-weight:600;}
  .hi-date{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
  .hi-items{font-size:11px;color:var(--muted);line-height:1.7;}
  .hi-total{font-size:12px;font-weight:600;color:var(--green);margin-top:6px;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:12px;line-height:1.8;}
  .empty-state .icon{font-size:36px;margin-bottom:12px;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:var(--ink);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .tabs{display:flex;gap:2px;background:var(--panel2);border-radius:8px;padding:3px;border:1px solid var(--border);}
  .tab{flex:1;padding:6px;border-radius:6px;font-size:11px;font-weight:500;text-align:center;cursor:pointer;color:var(--muted);transition:all 0.15s;}
  .tab.active{background:var(--panel);color:var(--white);}
  .tip-box{font-size:11px;color:var(--muted);line-height:1.7;padding:0 2px;}
</style>
</head>
<body>

<header>
  <div class="logo">🧾</div>
  <div class="header-text">
    <h1>单据智能提取</h1>
    <p>供应商PDF / 微信图片 → AI自动识别 → 一键复制进飞书</p>
  </div>
  <div class="header-badge">AI 驱动</div>
</header>

<div class="app">
  <div class="left">
    <div>
      <div class="panel-label">上传单据</div>
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept="image/*,.pdf" />
        <div class="dz-icon">📄</div>
        <div class="dz-title">点击上传或拖拽文件</div>
        <div class="dz-sub">支持 PDF · JPG · PNG · 微信截图</div>
      </div>
    </div>

    <div>
      <div class="panel-label">文件预览</div>
      <div class="preview-area" id="previewArea">
        <div class="empty-state"><div class="icon">🖼</div>上传后在此预览</div>
      </div>
    </div>

    <button class="extract-btn" id="extractBtn" disabled>
      <span id="btnIcon">✨</span>
      <span id="btnText">上传文件后开始提取</span>
    </button>

    <div class="tip-box">
      💡 <strong style="color:var(--white)">使用方式：</strong>微信收到供应商图片 → 保存 → 上传到这里。AI识别物料、单价、数量后，一键复制进飞书台账，同时原始文件存档。
    </div>
  </div>

  <div class="right">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('extract')">📋 提取结果</div>
      <div class="tab" onclick="switchTab('history')">🗂 历史记录</div>
    </div>

    <div id="extractTab">
      <div class="status-bar" id="statusBar"></div>

      <div class="result-card" id="resultCard">
        <div class="result-header">
          <div class="result-header-left">
            <span class="result-title">识别结果</span>
            <span class="confidence-badge conf-high" id="confBadge">高置信度</span>
          </div>
          <button class="btn btn-ghost" onclick="clearResult()">清除</button>
        </div>

        <div class="fields-section">
          <div class="fields-title">基本信息</div>
          <div class="field-row"><div class="field-key">供应商</div><textarea class="field-val" id="f-supplier" rows="1"></textarea></div>
          <div class="field-row"><div class="field-key">单据日期</div><textarea class="field-val" id="f-date" rows="1"></textarea></div>
          <div class="field-row"><div class="field-key">单据编号</div><textarea class="field-val" id="f-docnum" rows="1"></textarea></div>
          <div class="field-row"><div class="field-key">币种</div><textarea class="field-val" id="f-currency" rows="1"></textarea></div>
          <div class="field-row"><div class="field-key">总金额</div><textarea class="field-val" id="f-total" rows="1"></textarea></div>
          <div class="field-row"><div class="field-key">付款条款</div><textarea class="field-val" id="f-payment" rows="1"></textarea></div>
          <div class="field-row"><div class="field-key">交货日期</div><textarea class="field-val" id="f-delivery" rows="1"></textarea></div>
          <div class="field-row"><div class="field-key">备注</div><textarea class="field-val" id="f-notes" rows="2"></textarea></div>
        </div>

        <div class="items-section">
          <div class="fields-title">物料明细</div>
          <table class="items-table">
            <thead><tr><th style="width:36%">物料名称</th><th style="width:12%">数量</th><th style="width:12%">单位</th><th style="width:18%">单价</th><th style="width:22%">小计</th></tr></thead>
            <tbody id="itemsBody"></tbody>
          </table>
        </div>

        <div class="actions">
          <button class="btn btn-primary" onclick="copyToFeishu()">📋 复制飞书格式</button>
          <button class="btn btn-secondary" onclick="saveToHistory()">💾 存入历史</button>
          <button class="btn btn-secondary" onclick="copyJSON()">{ } JSON</button>
        </div>
      </div>

      <div id="emptyExtract" class="empty-state">
        <div class="icon">🧾</div>
        上传供应商单据后<br>AI自动识别物料、单价、数量<br>
        <span style="font-size:11px;color:var(--gray)">支持中英文混排 · PDF · 图片</span>
      </div>
    </div>

    <div id="historyTab" style="display:none">
      <div id="historyList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentFile = null;
let currentResult = null;
let history = [];
try { history = JSON.parse(localStorage.getItem('po_history') || '[]'); } catch(e){}

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const previewArea = document.getElementById('previewArea');
const extractBtn = document.getElementById('extractBtn');

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (!file) return;
  currentFile = file;
  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = e => { previewArea.innerHTML = `<img src="${e.target.result}" alt="preview">`; };
    reader.readAsDataURL(file);
  } else {
    previewArea.innerHTML = `<div class="pdf-icon"><div>📄</div>${esc(file.name)}<br><span style="font-size:10px">${(file.size/1024).toFixed(0)} KB</span></div>`;
  }
  extractBtn.disabled = false;
  document.getElementById('btnText').textContent = '✨  开始提取信息';
}

extractBtn.addEventListener('click', async () => {
  if (!currentFile) return;
  setStatus('loading', '⏳  AI正在识别单据信息...');
  extractBtn.disabled = true;
  document.getElementById('btnIcon').innerHTML = '<span class="spin">⟳</span>';
  document.getElementById('btnText').textContent = '识别中...';
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('emptyExtract').style.display = 'none';

  try {
    const base64full = await fileToBase64(currentFile);
    const base64data = base64full.split(',')[1];
    const isPDF = currentFile.type === 'application/pdf';
    const mediaType = currentFile.type;

    const contentBlock = isPDF
      ? { type: 'document', source: { type: 'base64', media_type: mediaType, data: base64data } }
      : { type: 'image',    source: { type: 'base64', media_type: mediaType, data: base64data } };

    const prompt = `你是专业采购单据识别助手。分析这份单据（采购单/报价单/发货单/发票等），提取所有关键信息。

严格只返回JSON，不要任何其他文字：

{
  "supplier": "供应商名称",
  "doc_date": "日期YYYY-MM-DD，不确定写null",
  "doc_number": "单据编号",
  "currency": "USD或CNY或EUR等",
  "total_amount": "总金额数字，不含货币符号",
  "payment_terms": "付款条款，没有写null",
  "delivery_date": "交货日期YYYY-MM-DD，没有写null",
  "notes": "重要备注，没有写null",
  "confidence": "high或medium",
  "items": [
    {
      "name": "物料名称含型号规格，保留原文",
      "quantity": "数量数字",
      "unit": "单位pcs/个/kg等",
      "unit_price": "单价数字",
      "subtotal": "小计数字"
    }
  ]
}`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: [contentBlock, { type: 'text', text: prompt }] }]
      })
    });

    const data = await response.json();
    const text = (data.content || []).map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);
    currentResult = result;
    renderResult(result);
    setStatus('success', '✅  识别完成，请检查后复制进飞书台账');
  } catch(err) {
    console.error(err);
    setStatus('error', '❌  识别失败，请重试或检查文件格式');
    document.getElementById('emptyExtract').style.display = 'block';
  } finally {
    extractBtn.disabled = false;
    document.getElementById('btnIcon').textContent = '✨';
    document.getElementById('btnText').textContent = '重新提取';
  }
});

function renderResult(r) {
  const v = k => (r[k] && r[k] !== 'null') ? r[k] : '';
  document.getElementById('f-supplier').value = v('supplier');
  document.getElementById('f-date').value     = v('doc_date');
  document.getElementById('f-docnum').value   = v('doc_number');
  document.getElementById('f-currency').value = v('currency');
  document.getElementById('f-total').value    = v('total_amount');
  document.getElementById('f-payment').value  = v('payment_terms');
  document.getElementById('f-delivery').value = v('delivery_date');
  document.getElementById('f-notes').value    = v('notes');

  const badge = document.getElementById('confBadge');
  badge.textContent = r.confidence === 'high' ? '高置信度' : '中等置信度';
  badge.className = 'confidence-badge ' + (r.confidence === 'high' ? 'conf-high' : 'conf-med');

  const tbody = document.getElementById('itemsBody');
  tbody.innerHTML = '';
  (r.items || []).forEach((item, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><div class="item-tag">物料 ${i+1}</div><input class="item-input" value="${esc(item.name||'')}"></td>
      <td><input class="item-input" value="${esc(item.quantity||'')}" style="width:52px"></td>
      <td><input class="item-input" value="${esc(item.unit||'')}" style="width:44px"></td>
      <td><input class="item-input" value="${esc(item.unit_price||'')}" style="width:72px"></td>
      <td><input class="item-input" value="${esc(item.subtotal||'')}" style="width:82px"></td>`;
    tbody.appendChild(tr);
  });

  document.getElementById('resultCard').classList.add('show');
  document.getElementById('emptyExtract').style.display = 'none';
}

function getFormData() {
  const items = [];
  document.querySelectorAll('#itemsBody tr').forEach(tr => {
    const ins = tr.querySelectorAll('input');
    if (ins.length >= 5) items.push({ name:ins[0].value, quantity:ins[1].value, unit:ins[2].value, unit_price:ins[3].value, subtotal:ins[4].value });
  });
  return {
    supplier: document.getElementById('f-supplier').value,
    doc_date: document.getElementById('f-date').value,
    doc_number: document.getElementById('f-docnum').value,
    currency: document.getElementById('f-currency').value,
    total_amount: document.getElementById('f-total').value,
    payment_terms: document.getElementById('f-payment').value,
    delivery_date: document.getElementById('f-delivery').value,
    notes: document.getElementById('f-notes').value,
    items
  };
}

function copyToFeishu() {
  const r = getFormData();
  const cur = r.currency || '';
  let text = `【采购单据】\n供应商：${r.supplier}\n日期：${r.doc_date}\n单据号：${r.doc_number}\n币种：${cur}\n总金额：${r.total_amount}\n`;
  if (r.payment_terms) text += `付款：${r.payment_terms}\n`;
  if (r.delivery_date) text += `交期：${r.delivery_date}\n`;
  text += `\n【物料明细】\n`;
  r.items.forEach((item, i) => {
    text += `${i+1}. ${item.name}\n   数量：${item.quantity} ${item.unit}  单价：${cur} ${item.unit_price}  小计：${cur} ${item.subtotal}\n`;
  });
  if (r.notes) text += `\n备注：${r.notes}`;
  copyText(text);
}

function copyJSON() { copyText(JSON.stringify(getFormData(), null, 2)); }

function saveToHistory() {
  const d = getFormData();
  d.saved_at = new Date().toLocaleDateString('zh-CN');
  history.unshift(d);
  if (history.length > 50) history = history.slice(0, 50);
  try { localStorage.setItem('po_history', JSON.stringify(history)); } catch(e){}
  renderHistory();
  showToast('✓ 已存入历史记录');
}

function clearResult() {
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('emptyExtract').style.display = 'block';
  document.getElementById('statusBar').classList.remove('show');
  currentResult = null;
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!history.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🗂</div>还没有历史记录<br>提取并保存后显示在这里</div>`;
    return;
  }
  el.innerHTML = history.map((h,i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="hi-top">
        <div class="hi-supplier">${esc(h.supplier||'未知供应商')}</div>
        <div class="hi-date">${h.doc_date||h.saved_at||''}</div>
      </div>
      <div class="hi-items">${(h.items||[]).map(it=>`${esc(it.name)} × ${it.quantity}`).join('  ·  ')}</div>
      <div class="hi-total">${h.currency||''} ${h.total_amount||''}</div>
    </div>`).join('');
}

function loadHistory(i) { currentResult = history[i]; renderResult(history[i]); switchTab('extract'); }

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active',(i===0)===(tab==='extract')));
  document.getElementById('extractTab').style.display = tab==='extract'?'block':'none';
  document.getElementById('historyTab').style.display = tab==='history'?'block':'none';
  if (tab==='history') renderHistory();
}

function setStatus(type, msg) {
  const el = document.getElementById('statusBar');
  el.className = 'status-bar show ' + type;
  el.textContent = msg;
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('✓ 已复制到剪贴板'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fileToBase64(f) { return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(f); }); }

renderHistory();
</script>
